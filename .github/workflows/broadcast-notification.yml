name: Broadcast Telegram notification

on:
  workflow_dispatch:
    inputs:
      notification_type:
        description: Notification type
        required: true
        type: choice
        options:
          - release
          - critical
          - maintenance
          - announcement
          - roadmap
      identifier:
        description: Release version or news slug
        required: true
        type: string
      dry_run:
        description: Validate metadata without broadcasting
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  broadcast:
    runs-on: ubuntu-latest
    steps:
      - name: Validate or broadcast notification
        env:
          NOTIFY_ENDPOINT: ${{ secrets.NOTIFY_ENDPOINT }}
          INTERNAL_NOTIFY_SECRET: ${{ secrets.INTERNAL_NOTIFY_SECRET }}
          NOTIFICATION_TYPE: ${{ inputs.notification_type }}
          IDENTIFIER: ${{ inputs.identifier }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          : "${NOTIFY_ENDPOINT:?NOTIFY_ENDPOINT secret is required}"
          : "${INTERNAL_NOTIFY_SECRET:?INTERNAL_NOTIFY_SECRET secret is required}"

          if [ "$NOTIFICATION_TYPE" = "release" ]; then
            IDENTITY_FIELD="version"
            BROADCAST_PATH="release-broadcast"
          else
            IDENTITY_FIELD="slug"
            BROADCAST_PATH="publication-broadcast"
          fi

          if [ "$DRY_RUN" = "true" ]; then
            ENDPOINT_PATH="release-preview"
            jq -n \
              --arg type "$NOTIFICATION_TYPE" \
              --arg identity "$IDENTIFIER" \
              --arg identityField "$IDENTITY_FIELD" \
              '{type: $type, source: "github-actions", dryRun: true} + {($identityField): $identity}' \
              > payload.json
          else
            ENDPOINT_PATH="$BROADCAST_PATH"
            jq -n \
              --arg type "$NOTIFICATION_TYPE" \
              --arg identity "$IDENTIFIER" \
              --arg identityField "$IDENTITY_FIELD" \
              '{type: $type, source: "github-actions"} + {($identityField): $identity}' \
              > payload.json
          fi

          curl --fail-with-body \
            --request POST \
            --retry 3 \
            --retry-all-errors \
            --header "Authorization: Bearer $INTERNAL_NOTIFY_SECRET" \
            --header "Content-Type: application/json" \
            --data @payload.json \
            "${NOTIFY_ENDPOINT%/}/internal/notifications/$ENDPOINT_PATH"
